<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Private Gallery</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    text-align: center;
}

/* Login Screen */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#login h2 {
    margin-bottom: 10px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin: 10px;
    width: 200px;
    text-align: center;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1e3c;
}

/* Gallery */
#gallery {
    display: none;
    padding: 20px;
    animation: fadeIn 1s ease-in-out;
}

h1 {
    margin-bottom: 20px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 10px;
}

.grid img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.grid img:hover {
    transform: scale(1.05);
}

/* Fade animation */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Footer */
footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="login">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🖼️ GALLERY -->
<div id="gallery">
    <h1>✨ My Private Gallery ✨</h1>

    <div class="grid">
        <!-- Replace these with your images -->
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
    </div>

    <footer>🔐 Private • Secure • Personal</footer>
</div>

<script>
// 🔐 PASSWORD CHECK + MUSIC START
function checkPassword() {
    let pass = document.getElementById("password").value;
    let music = document.getElementById("bgMusic");

    if (pass === "1590") {
        document.getElementById("login").style.display = "none";
        document.getElementById("gallery").style.display = "block";

        music.play(); // 🎵 start music
    } else {
        alert("❌ Wrong password!");
    }
}

// 🔐 ENCRYPTED NAME (GOWRY NANDANA)
let encryptedName = "R09XUlkgTkFOREFOQQ==";

// Decode secretly
function decodeName(encoded) {
    return atob(encoded);
}

// Hidden console message
console.log("Owner:", decodeName(encryptedName));
</script>

</body>
</html>
